name: Publish trigger test

on:
  pull_request:
    types: [closed]
    branches:
      - jan/publish

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  version:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'releases/')
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # required for git tags and history

      - name: Extract version from branch name ${{ github.head_ref }}
        id: get-version
        run: |
          BRANCH="${{ github.head_ref }}"
          VERSION=$(./.github/scripts/get-version.sh "$BRANCH")

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"