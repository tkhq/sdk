name: Version and Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (leave empty to auto-generate v{year}.{month}.{counter})"
        required: false
        type: string
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  version:
    runs-on: ubuntu-latest
    # workflow_dispatch always runs; pull_request only runs when a release/* PR is merged into main
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && startsWith(github.head_ref, 'release/'))
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # required for git tags and history

      - name: Determine version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Extract version from the release/* branch name
            VERSION=$(./.github/scripts/get-version.sh "${{ github.head_ref }}")
          else
            # workflow_dispatch: use the provided input, or auto-generate
            VERSION="${{ inputs.version }}"
            if [ -z "$VERSION" ]; then
              VERSION=$(./.github/scripts/generate-version.sh)
            fi
          fi

          ./.github/scripts/check-version.sh "$VERSION"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish
    needs: version
    uses: ./.github/workflows/reusable-publish.yml
    secrets: inherit
    permissions:
      contents: write
      packages: write
      id-token: write
    with:
      version: ${{ needs.version.outputs.version }}
