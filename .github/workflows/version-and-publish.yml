name: Test, Build, Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (leave empty to auto-generate v{year}.{month}.{counter})"
        required: false
        type: string
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write

env:
  NODE_ENV: production

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # required for git tags and history
          ref: ${{ github.event.repository.default_branch }}

      - name: Extract or generate version
        id: extract-version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            # Manual trigger
            if [[ -n "${{ inputs.version }}" ]]; then
              # Use provided version
              VERSION="${{ inputs.version }}"
            else
              # Auto-generate: v{year}.{month}.{counter}
              YEAR=$(date +%Y)
              MONTH=$(date +%-m)  # No leading zero
              PREFIX="v${YEAR}.${MONTH}."

              # Find highest existing counter for this month
              HIGHEST=$(git tag -l "${PREFIX}*" | sed "s/${PREFIX}//" | sort -n | tail -1)
              if [[ -z "$HIGHEST" ]]; then
                COUNTER=0
              else
                COUNTER=$((HIGHEST + 1))
              fi

              VERSION="${PREFIX}${COUNTER}"
            fi
          else
            # PR trigger - extract from branch name
            VERSION="${GITHUB_HEAD_REF#release/}"
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version does not match expected format vX.X.X (got: $VERSION)"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

  build:
    name: Build
    needs: version
    uses: ./.github/workflows/reusable-build.yml

  test-pre-prod:
    name: Test (pre-prod)
    needs: build
    uses: ./.github/workflows/reusable-test-pre-prod.yml
    secrets: inherit

  test-prod:
    name: Test (prod)
    needs: build
    uses: ./.github/workflows/reusable-test-prod.yml
    secrets: inherit

  publish:
    needs: [test-pre-prod, test-prod, build]
    runs-on:
      group: package-deploy
    environment: production # require manual approval for production deployments

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # required for git tags and history
          ref: ${{ github.event.repository.default_branch }}

      - name: Configure Git User
        run: |
          git config user.name "tkhq-deploy"
          git config user.email "github@turnkey.engineering"

      - name: Setup JS
        uses: ./.github/actions/js-setup

      # Install foundry toolchain
      - name: Setup Foundry
        uses: ./.github/actions/foundry-setup

      - name: Build
        run: pnpm build

      - name: Setup npm trusted publishing toolchain
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Install npm CLI with trusted publishing support
        run: npm install --global npm@11.6.0

      - name: Confirm npm trusted publishing environment
        run: |
          echo "node: $(node --version)"
          echo "npm: $(npm --version)"
          echo "pnpm: $(pnpm --version)"

          node -e '
            const [major, minor, patch] = process.versions.node.split(".").map(Number);
            if (major < 22 || (major === 22 && (minor < 14 || (minor === 14 && patch < 0)))) {
              throw new Error(`npm trusted publishing requires Node >=22.14.0, got ${process.versions.node}`);
            }
          '

          npm --version | node -e '
            const version = require("fs").readFileSync(0, "utf8").trim();
            const [major, minor, patch] = version.split(".").map(Number);
            if (major < 11 || (major === 11 && (minor < 5 || (minor === 5 && patch < 1)))) {
              throw new Error(`npm trusted publishing requires npm >=11.5.1, got ${version}`);
            }
          '

          if [ -n "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] && [ -n "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "GitHub Actions OIDC request environment is set"
          else
            echo "GitHub Actions OIDC request environment is not set"
            exit 1
          fi

      - name: Publish to NPM (dry run)
        run: |
          pnpm publish -r --dry-run --no-git-checks --report-summary
          echo "npm publish dry run summary:"
          cat pnpm-publish-summary.json || echo "No NPM dry run summary generated"

      - name: Publish packages to NPM
        run: |
          echo "Publishing packages to NPM..."
          pnpm publish -r --no-git-checks --report-summary || {
            echo "❌ Publish failed. Check logs above.";
            exit 1;
          }
          echo "npm publish summary:"
          cat pnpm-publish-summary.json || echo "No NPM publish summary generated"

  prepare-release:
    runs-on: ubuntu-latest
    needs: [publish, version]
    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # required for git tags and history
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup JS
        uses: ./.github/actions/js-setup

      - name: Build
        run: pnpm build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 #v2.2.2
        with:
          tag_name: ${{ needs.version.outputs.version }}
          name: Release ${{ needs.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
