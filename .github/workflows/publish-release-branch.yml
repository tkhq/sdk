name: Publish from release branch

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # required for git tags and history

      - name: Extract version from branch name ${{ github.head_ref }}
        id: get-version
        run: |
          BRANCH="${{ github.head_ref }}"
          VERSION=$(./.github/scripts/get-version.sh "$BRANCH")

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish
    needs: version
    uses: ./.github/workflows/reusable-publish.yml
    secrets: inherit
    with:
      version: ${{ needs.version.outputs.version }}